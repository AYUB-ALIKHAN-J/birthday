<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD Deva</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Inter:wght@400;600;800&family=Outfit:wght@300;400;700&display=swap" rel="stylesheet">
    <!-- CSS -->
    <link rel="stylesheet" href="parallax.css">
    <!-- Audio Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/howler/2.2.3/howler.min.js"></script>
</head>
<body>
    <!-- Retro Loading Screen -->
    <div id="loading-screen">
        <div class="loader-content">
            <div id="loader-percentage" class="pixel-text">[ 0% ]</div>
            <p class="loading-status">❤ LOADING LOVE ❤</p>
            <div class="progress-bar-container">
                <div class="progress-bar"><div class="progress-fill"></div></div>
                <div class="heart-indicator">❤</div>
            </div>
            <p class="dream-msg">Ayub is dreaming of you...</p>
        </div>
    </div>

    <!-- Main Parallax Background -->
    <div id="parallax-container">
        <!-- Intro Bench (Inside parallax for z-index layering) -->
        <div id="intro-bench-container" class="hidden">
            <img src="../assets/bench.png" id="intro-bench" class="bench-image">
        </div>

        <!-- Boy Character -->
        <div id="boy-container" class="character-container hidden">
            <div id="exclamation-icon" class="hidden">!</div>
            <img src="../assets/boy_character/boysittingonbench.png" id="boy-sprite" class="character-sprite">
        </div>

        <!-- Girl Character -->
        <div id="girl-container" class="character-container hidden">
            <img src="../assets/girl_character/simplegirl.png" id="girl-sprite" class="character-sprite">
        </div>

        <!-- Floating Speech Bubble -->
        <div id="speech-bubble" class="hidden">...</div>
    </div>
    
    <!-- Scrollable Space for Parallax -->
    <div id="content-section"></div>

    <!-- UI Overlay for Narrative Prompts -->
    <div id="ui-layer">
        <!-- Intro Scroll Prompt -->
        <div id="intro-prompt" class="hidden">
            <div class="scroll-arrow">↓</div>
            <p class="pixel-text">SCROLL TO WALK</p>
        </div>

        <!-- Grand Finale Surprise Wrapper (Injected by JS) -->
    </div>

    <!-- Top-level Story Credits -->
    <div id="story-credits" class="hidden"></div>
    
    <!-- Polaroid Photo Gallery Overlay -->
    <div id="photo-gallery" class="photo-wrapper"></div>

    <div id="bridge-text" class="bridge-text">Keep scrolling my dear for our memories... ❤️</div>

    <!-- Final Hand-written Note (Book/Page Flip) -->
    <div id="final-note" class="note-container hidden">
        <div id="book-wrapper">
            <div id="page-flip">
                <!-- The Moving Leaf (Cover & Inside Left) -->
                <div id="flipping-leaf">
                    <div class="page-side cover-front">
                        <div class="note-cover-title">A Promise <br> to You</div>
                        <div class="spine-shadow"></div>
                    </div>
                    <div class="page-side inside-left">
                        <div class="note-content-area left-page">
                            <div id="note-part-1"></div>
                        </div>
                        <div class="spine-shadow-right"></div>
                    </div>
                </div>

                <!-- The Base Page (Inside Right) -->
                <div class="page-side inside-right">
                    <div class="note-content-area right-page">
                        <div id="note-part-2"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="closing-hint">Happy Birthday, my love! I'll love you forever. Enjoy this day and good night... ❤️</div>
    </div>

    <!-- Scroll Indicator -->
    <div id="scroll-hint" style="position: fixed; bottom: 20px; right: 20px; opacity: 0.5; font-size: 12px; z-index: 1000;">
        Scroll to start the journey ↓
    </div>

    <!-- JS Engine -->
    <script src="parallax.js"></script>
</body>
</html>
